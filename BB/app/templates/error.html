{% extends "base.html" %}

{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-red-500">{{ code }}</h1>
        <h2 class="text-4xl font-semibold text-gray-800 mt-4">Oops! {{ message }}</h2>
        <p class="text-lg text-gray-600 mt-2">The page you're looking for seems to have encountered an error.</p>
        <a href="/" class="mt-6 inline-block bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 transition">Go Back Home</a>
    </div>
</div>
{% endblock %}
