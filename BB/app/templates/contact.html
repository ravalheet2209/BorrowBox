{% extends "base.html" %}
{% block title %}Contact{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto px-6 py-16">
  <h1 class="text-3xl font-bold mb-8">Contact Us</h1>

  <form class="space-y-5">
    <input placeholder="Your Name"
           class="w-full px-4 py-3 border rounded-xl dark:bg-surface-dark">
    <input placeholder="Email"
           class="w-full px-4 py-3 border rounded-xl dark:bg-surface-dark">
    <textarea placeholder="Message"
              class="w-full px-4 py-3 border rounded-xl dark:bg-surface-dark h-32"></textarea>

    <button class="bg-primary text-white px-6 py-3 rounded-xl font-bold">
      Send Message
    </button>
  </form>
</section>
{% endblock %}
